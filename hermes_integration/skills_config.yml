# Конфігурація skills для Hermes Dashboard.
# Цей файл — універсальна декларація, яку зчитує hermes_adapter.py.
# Якщо у твоєму Hermes Dashboard інший формат — адаптуй під нього.

skills:
  - id: english_learning_bot
    name: "English Learning Bot"
    description: "Персональний тренер англійської на базі Grok — щоденні уроки"
    entrypoint: "main:english_daily_job"
    enabled: true
    schedule: "0 9 * * *"                 # 09:00 щодня
    config:
      grok_model: "grok-4-0709"
      user_language: "uk"
      target_language: "en"

  - id: crypto_daily_reports
    name: "Crypto Market Daily Reports"
    description: "Триразові звіти по крипторинку (08:00, 14:00, 20:00)"
    entrypoint: "main:crypto_report_job"
    enabled: true
    schedule:
      - "0 8 * * *"
      - "0 14 * * *"
      - "0 20 * * *"

  - id: crypto_fast_movers
    name: "Crypto Fast Movers Watcher"
    description: "Одноразовий скан різких рухів (>5% за 5хв) — кожні 5 хв через cron"
    entrypoint: "main:fast_movers_job"
    enabled: true
    schedule: "*/5 * * * *"                # кожні 5 хв

  - id: polymarket_arbitrage
    name: "Polymarket Internal Arbitrage Scan"
    description: "Сканування Polymarket на внутрішній арбітраж (top-of-book)"
    entrypoint: "main:polymarket_scan_job"
    enabled: true
    schedule: "*/30 * * * *"               # кожні 30 хв

  - id: polymarket_depth_scan
    name: "Polymarket Deep Arbitrage Scan"
    description: "Глибокий арбітраж з урахуванням повного orderbook"
    entrypoint: "main:polymarket_depth_job"
    enabled: true
    schedule: "0 */2 * * *"                # кожні 2 години

  - id: polymarket_news_linker
    name: "Polymarket News→Markets Linker"
    description: "Звʼязує новини з RSS-фідів із ринками Polymarket"
    entrypoint: "main:polymarket_news_job"
    enabled: true
    schedule: "0 */6 * * *"                # кожні 6 год

  - id: polymarket_topic_monitor
    name: "Polymarket Topic Monitor"
    description: "Моніторинг ринків Polymarket за обраною темою"
    entrypoint: "main:polymarket_topic_job"
    enabled: true
    schedule: "0 */4 * * *"
    config:
      keyword: "trump"

  # Phase 5-6: Coordinator + Strategies
  - id: coordinator_digest
    name: "Coordinator Digest"
    description: "Композитний digest від Coordinator кожні 4 години → #824"
    entrypoint: "scripts/coordinator_digest.py"
    enabled: true
    schedule: "0 */4 * * *"

  - id: deribit_scan
    name: "Deribit Basis Scan"
    description: "Сканування basis arbitrage на Deribit → #827"
    entrypoint: "scripts/deribit_scan.py"
    enabled: true
    schedule: "0 9 * * *"

  - id: lp_scan
    name: "LP Yield Scan"
    description: "Сканування LP пулів по APY → #827"
    entrypoint: "scripts/lp_scan.py"
    enabled: true
    schedule: "0 10 * * 0"

  - id: onchain_whales
    name: "On-chain Whale Monitor"
    description: "Моніторинг великих транзакцій → #828"
    entrypoint: "scripts/onchain_whales.py"
    enabled: true
    schedule: "0 */6 * * *"

  - id: system_health
    name: "System Health Check"
    description: "Перевірка health всіх компонентів → #828"
    entrypoint: "scripts/health_check.py"
    enabled: true
    schedule: "0 * * * *"
